{% extends "base.html" %}

{% block title %}修改密码 - 物品管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title text-center mb-0">修改密码</h4>
            </div>
            <div class="card-body p-4 text-center">
                <!-- 【修改】：移除旧密码输入框，改为发送邮件引导 -->
                <div class="alert alert-info mb-4">
                    <i class="bi bi-shield-lock me-2"></i>
                    为了账号安全，我们已取消直接输入旧密码修改的方式。<br>
                    请点击下方按钮，系统将向您的验证邮箱 <strong>{{ current_user.email }}</strong> 发送重置链接。
                </div>

                <form method="POST">
                    {{ form.hidden_tag() }} <!-- 即使没有字段，CSRF token 也是必须的 -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-envelope-paper me-2"></i>发送重置密码邮件
                        </button>
                    </div>
                </form>

                <div class="mt-4">
                    <a href="{{ url_for('auth.profile') }}" class="text-secondary">返回个人中心</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
